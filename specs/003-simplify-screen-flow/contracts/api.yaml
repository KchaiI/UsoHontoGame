openapi: 3.0.3
info:
  title: UsoHontoGame API - Simplified Navigation
  description: |
    API contracts for the Simplify Screen Flow feature.

    **NOTE**: This feature is a presentation layer refactoring.
    All API endpoints remain UNCHANGED from the existing implementation.

    This document serves as reference for the simplified navigation flow.
  version: 1.0.0
  contact:
    name: UsoHontoGame Team

servers:
  - url: http://localhost:3000
    description: Development server
  - url: https://production-domain.com
    description: Production server (TBD)

tags:
  - name: sessions
    description: Game session management (UNCHANGED)
  - name: host
    description: Host authentication and access (UNCHANGED)

paths:
  /api/sessions-v2:
    post:
      summary: Create new game session
      description: |
        Creates a new game session with episodes and returns session ID.
        Sets host cookie automatically.

        **Flow**: Called from CreatePage → User redirected to JoinPage with sessionId

        **UNCHANGED**: This endpoint works exactly as before. No modifications for simplified navigation.
      tags:
        - sessions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - episodes
              properties:
                episodes:
                  type: array
                  description: List of game episodes (1-20 items)
                  minItems: 1
                  maxItems: 20
                  items:
                    type: object
                    required:
                      - content
                    properties:
                      content:
                        type: string
                        description: Episode statement text
                        minLength: 1
                        example: "I once climbed Mount Fuji"
            examples:
              single-episode:
                summary: Single episode game
                value:
                  episodes:
                    - content: "I speak three languages fluently"
              multiple-episodes:
                summary: Multiple episode game
                value:
                  episodes:
                    - content: "I've visited 25 countries"
                    - content: "I can play the piano"
                    - content: "I've run a marathon"
      responses:
        '201':
          description: Session created successfully
          headers:
            Set-Cookie:
              description: Host authentication cookie
              schema:
                type: string
                example: game_host_ABC1234567=host_xyz789; Max-Age=86400; Path=/; SameSite=Lax
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - data
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    required:
                      - sessionId
                      - message
                    properties:
                      sessionId:
                        type: string
                        description: Unique 10-character session ID
                        pattern: '^[23456789ABCDEFGHJKMNPQRSTUVWXYZ]{10}$'
                        example: ABC1234567
                      message:
                        type: string
                        example: "Game session created successfully. Session ID: ABC1234567"
        '400':
          description: Invalid request (validation error)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                no-episodes:
                  summary: No episodes provided
                  value:
                    success: false
                    error:
                      message: "Please add at least one episode"
                      code: "VALIDATION_ERROR"
                empty-content:
                  summary: Empty episode content
                  value:
                    success: false
                    error:
                      message: "All episodes must have content"
                      code: "VALIDATION_ERROR"
                too-many-episodes:
                  summary: Exceeds maximum episode count
                  value:
                    success: false
                    error:
                      message: "Maximum 20 episodes allowed"
                      code: "VALIDATION_ERROR"
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: "Failed to create game session"
                  code: "INTERNAL_ERROR"

  /api/sessions/{id}/host-access:
    get:
      summary: Check if current user is host
      description: |
        Verifies if the requester is the host of the specified session
        by checking the host cookie.

        **Flow**: Called from JoinPage to determine if host controls should be shown

        **UNCHANGED**: This endpoint works exactly as before. No modifications for simplified navigation.
      tags:
        - host
      parameters:
        - name: id
          in: path
          required: true
          description: Session ID to check
          schema:
            type: string
            pattern: '^[23456789ABCDEFGHJKMNPQRSTUVWXYZ]{10}$'
            example: ABC1234567
        - name: Cookie
          in: header
          required: false
          description: Host authentication cookie
          schema:
            type: string
            example: game_host_ABC1234567=host_xyz789
      responses:
        '200':
          description: Host access check completed
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - data
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    required:
                      - isHost
                      - sessionId
                    properties:
                      isHost:
                        type: boolean
                        description: True if requester is the host
                        example: true
                      sessionId:
                        type: string
                        description: Session ID that was checked
                        example: ABC1234567
              examples:
                is-host:
                  summary: User is the host
                  value:
                    success: true
                    data:
                      isHost: true
                      sessionId: ABC1234567
                not-host:
                  summary: User is not the host
                  value:
                    success: true
                    data:
                      isHost: false
                      sessionId: ABC1234567
        '400':
          description: Invalid session ID format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: "Invalid session ID format"
                  code: "VALIDATION_ERROR"
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: "Session with ID ABC1234567 not found"
                  code: "NOT_FOUND"
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  message: "Failed to check host access"
                  code: "INTERNAL_ERROR"

components:
  schemas:
    ErrorResponse:
      type: object
      required:
        - success
        - error
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          required:
            - message
            - code
          properties:
            message:
              type: string
              description: Human-readable error message
              example: "Session not found"
            code:
              type: string
              description: Machine-readable error code
              enum:
                - VALIDATION_ERROR
                - NOT_FOUND
                - INTERNAL_ERROR
              example: "NOT_FOUND"

  securitySchemes:
    HostCookie:
      type: apiKey
      in: cookie
      name: game_host_{sessionId}
      description: |
        Cookie-based host authentication.

        Format: `game_host_{sessionId}={hostId}`

        Automatically set by POST /api/sessions-v2 response.
        Valid for 24 hours.

security:
  - HostCookie: []

x-navigation-flows:
  simplified-game-creation:
    description: |
      Complete game creation flow in simplified navigation
    steps:
      - step: 1
        action: User navigates to /create
        page: CreatePage
        api: null
      - step: 2
        action: User fills episode form
        page: CreatePage
        api: null
      - step: 3
        action: User submits form
        page: CreatePage
        api: POST /api/sessions-v2
      - step: 4
        action: API creates session and sets cookie
        page: null
        api: Response with sessionId + Set-Cookie
      - step: 5
        action: Client redirects to JoinPage
        page: JoinPage
        api: null
      - step: 6
        action: JoinPage checks host access
        page: JoinPage
        api: GET /api/sessions/{id}/host-access
      - step: 7
        action: Host controls shown if isHost=true
        page: JoinPage
        api: null

x-removed-routes:
  description: |
    These routes were removed in the simplify-screen-flow feature.
    API endpoints that served these routes are NOT in this contract.
  routes:
    - path: /game/{id}
      reason: Game play functionality removed
      date-removed: 2025-11-10
    - path: /results/{sessionId}
      reason: Results display functionality removed
      date-removed: 2025-11-10
    - path: /host/{sessionId}
      reason: Host management UI removed
      date-removed: 2025-11-10
    - path: /manage/{sessionId}
      reason: Alternative host management UI removed
      date-removed: 2025-11-10

x-testing-guide:
  description: API testing guide for simplified navigation
  unit-tests:
    - file: tests/integration/api/sessions-v2.test.ts
      status: UNCHANGED - all tests remain valid
    - file: tests/integration/api/host-access.test.ts
      status: UNCHANGED - all tests remain valid
  integration-tests:
    - file: tests/integration/complete-player-journey.test.ts
      status: UPDATE - remove steps for /game and /results navigation
  manual-testing:
    create-and-join-flow:
      steps:
        - curl -X POST http://localhost:3000/api/sessions-v2 -H "Content-Type: application/json" -d '{"episodes":[{"content":"Test"}]}'
        - Extract sessionId and cookie from response
        - curl http://localhost:3000/api/sessions/{sessionId}/host-access -H "Cookie: game_host_{sessionId}={hostId}"
        - Verify isHost=true in response
